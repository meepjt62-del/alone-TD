<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Tower Defense - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; margin: 0; user-select: none; }
        canvas { display: block; touch-action: none; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .shop-btn { transition: all 0.2s ease; position: relative; }
        .shop-btn:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        .shop-btn:active:not(:disabled) { transform: scale(0.95); }
        .speed-btn-active { background-color: #3b82f6 !important; color: white !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .tooltip { visibility: hidden; position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%); width: 180px; background-color: rgba(15, 23, 42, 0.98); color: #fff; text-align: center; padding: 10px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2); z-index: 100; font-size: 11px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .shop-btn:hover .tooltip { visibility: visible; opacity: 1; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .inventory-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="main-menu" class="absolute inset-0 z-50 flex flex-col items-center justify-center p-4 bg-slate-950/90 text-white">
        <h1 class="text-6xl font-extrabold mb-8 italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">IDLE TOWER</h1>
        <div class="glass-panel p-6 rounded-3xl w-full max-w-md shadow-2xl border-t border-white/10">
            <div class="flex justify-between items-center mb-6">
                <span class="text-xl font-bold">เหรียญถาวร: <span id="permanent-coins" class="text-yellow-400">0</span></span>
            </div>
            <h2 class="text-lg mb-4 font-semibold border-b border-slate-700 pb-2 flex items-center">
                <span class="mr-2">🛠️</span> Workshop (ถาวร)
            </h2>
            <div id="workshop-list" class="space-y-3 overflow-y-auto max-h-[40vh] pr-2 text-white"></div>
            <button onclick="startGame()" class="w-full mt-8 bg-blue-600 hover:bg-blue-500 font-bold py-4 rounded-2xl text-xl shadow-lg transition-all active:scale-95 border-b-4 border-blue-800">เข้าสู่สนามรบ</button>
        </div>
    </div>

    <div id="game-ui" class="hidden absolute inset-0 pointer-events-none p-4 flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="flex flex-col gap-2">
                <div class="glass-panel p-2 px-4 rounded-2xl pointer-events-auto border-l-4 border-blue-500">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Wave</p>
                    <p id="current-wave" class="text-2xl font-black text-white">1</p>
                </div>
                <div class="flex gap-1 pointer-events-auto flex-wrap max-w-[220px]">
                    <button onclick="setSpeed(1)" id="spd-1" class="speed-btn-active bg-slate-800 px-2 py-1 rounded text-[10px] font-bold text-white">x1</button>
                    <button onclick="setSpeed(2)" id="spd-2" class="bg-slate-800 px-2 py-1 rounded text-[10px] font-bold text-white">x2</button>
                    <button onclick="setSpeed(4)" id="spd-4" class="bg-slate-800 px-2 py-1 rounded text-[10px] font-bold text-white">x4</button>
                    <button onclick="setSpeed(8)" id="spd-8" class="bg-slate-800 px-2 py-1 rounded text-[10px] font-bold text-white">x8</button>
                    <button onclick="togglePause()" id="pause-btn" class="bg-red-900/60 px-2 py-1 rounded text-[10px] font-bold text-white">⏸ PAUSE</button>
                </div>
            </div>
            <div class="flex flex-col gap-2 items-end">
                <div class="glass-panel p-2 px-4 rounded-2xl pointer-events-auto min-w-[120px] border-r-4 border-cyan-400 text-right">
                    <p class="text-[10px] text-cyan-400 font-bold uppercase text-white">CASH</p>
                    <p id="run-cash" class="text-xl font-bold text-white">$ 0</p>
                </div>
                <button onclick="toggleInventory()" class="glass-panel p-2 px-3 rounded-xl bg-slate-800/60 pointer-events-auto border border-white/10 hover:bg-slate-700 transition text-white">
                    <span class="text-xs font-semibold text-white">📦 ดู Build</span>
                </button>
            </div>
        </div>

        <div id="inventory-modal" class="hidden absolute top-32 right-4 w-64 glass-panel p-4 rounded-2xl border-r-4 border-blue-500 pointer-events-auto z-50 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-3 text-white">
                <span class="text-xs font-bold text-blue-400 uppercase tracking-widest text-white">Equipped Items</span>
                <button onclick="toggleInventory()" class="text-slate-500 text-white">✕</button>
            </div>
            <div class="space-y-4 max-h-[50vh] overflow-y-auto">
                <div><p class="text-[10px] font-bold text-slate-400 mb-2 uppercase text-white">Weapons (<span id="wpn-count">0</span>/6)</p><div id="wpn-list" class="space-y-1 text-white"></div></div>
                <div><p class="text-[10px] font-bold text-slate-400 mb-2 uppercase text-white">Passives (<span id="pas-count">0</span>/6)</p><div id="pas-list" class="space-y-1 text-white"></div></div>
            </div>
        </div>

        <div id="game-msg" class="text-center text-4xl font-black text-white opacity-0 transition-all scale-150 pointer-events-none drop-shadow-lg">WAVE START!</div>

        <div class="w-full pointer-events-auto">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] font-bold text-blue-400 uppercase bg-slate-900/80 px-2 py-0.5 rounded-t-md border-t border-x border-white/10 italic text-white">Tactical Shop</span>
                <button onclick="manualRefresh()" id="refresh-btn" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1 rounded-lg text-[10px] font-bold transition active:scale-90 text-white">รีเฟรช ($<span id="refresh-cost">10</span>)</button>
            </div>
            <div id="shop-container" class="glass-panel p-2 rounded-xl grid grid-cols-3 md:grid-cols-6 gap-2 border-t-2 border-blue-500/50 shadow-xl"></div>
        </div>
    </div>

    <div id="game-over" class="hidden absolute inset-0 z-[60] flex items-center justify-center p-4 bg-black/90 text-center text-white">
        <div class="glass-panel p-8 rounded-3xl w-full max-w-sm border-t-4 border-red-500">
            <h2 class="text-4xl font-black text-red-500 mb-4 italic text-white">GAME OVER</h2>
            <p class="text-slate-300 mb-6 text-white">Wave: <span id="final-wave">1</span></p>
            <div class="bg-slate-900/50 p-4 rounded-2xl mb-8">
                <p class="text-slate-400 text-xs uppercase font-bold tracking-widest text-white">Coins Earned</p>
                <p id="earned-coins" class="text-3xl font-black text-yellow-400">+0</p>
            </div>
            <button onclick="backToMenu()" class="w-full bg-white text-slate-950 font-black py-3 rounded-xl hover:bg-slate-200 transition-all active:scale-95">กลับเมนูหลัก</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let isPlaying = false, isPaused = false, gameSpeed = 1, wave = 1, cash = 0, totalCoins = parseInt(localStorage.getItem('itd_coins')) || 0, runCoins = 0;
        let lastTime = performance.now(), nextWaveTimer = 0, manualRefreshCount = 0, spawnCooldown = 0;
        let enemies = [], projectiles = [], particles = [], lightningEffects = [], waveQueue = [], isWaveActive = false;

        const workshop = JSON.parse(localStorage.getItem('itd_workshop')) || {
            damage: { name: "Base ATK", lvl: 1, cost: 10, inc: 2.5 },
            health: { name: "Max HP", lvl: 1, cost: 10, inc: 40 },
            cashBonus: { name: "Cash+", lvl: 0, cost: 50, inc: 10 }
        };

        let tower = { x: 0, y: 0, size: 25, hp: 100, maxHp: 100, regen: 0, damage: 10, range: 240, atkSpeed: 1.0, atkTimer: 0, multishot: 1, shieldHp: 0, shieldMaxHp: 0, shieldAura: 0, weaponSlots: [], passiveSlots: [], levels: {}, critChance: 0, bounceChance: 0, cashMult: 1, coinMult: 1 };

        const weaponPool = [
            { id: 'w_atk', name: 'Base ATK', icon: '⚔️', type: 'weapon', desc: 'ดาเมจพื้นฐาน +10', baseCost: 15 },
            { id: 'w_ice', name: 'Frost Bolt', icon: '❄️', type: 'weapon', desc: 'แช่แข็งมอนสโลว์ 50%', baseCost: 150 },
            { id: 'w_lgt', name: 'Lightning', icon: '⚡', type: 'weapon', desc: 'สายฟ้าชิ่งโดนรอบๆ', baseCost: 200 }
        ];
        const passivePool = [
            { id: 'p_spd', name: 'ATK Speed', icon: '🏃', type: 'passive', desc: 'ยิงไวขึ้น 15%', baseCost: 20 },
            { id: 'p_hp', name: 'Max HP', icon: '❤️', type: 'passive', desc: 'เลือดสูงสุด +75', baseCost: 20 }
        ];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; tower.x = canvas.width/2; tower.y = canvas.height/2; }
        window.addEventListener('resize', resize); resize();

        function startGame() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            wave = 1; cash = 150; runCoins = 0; enemies = []; projectiles = []; tower.levels = {}; tower.weaponSlots = []; tower.passiveSlots = [];
            tower.damage = 10 + (workshop.damage.lvl-1)*workshop.damage.inc;
            tower.maxHp = 100 + (workshop.health.lvl-1)*workshop.health.inc; tower.hp = tower.maxHp;
            isPlaying = true; isPaused = false; generateShop(); updateUI(); requestAnimationFrame(gameLoop);
        }

        function generateShop() {
            const all = [...weaponPool, ...passivePool];
            currentShop = all.sort(() => 0.5 - Math.random()).slice(0, 6).map(item => {
                const lvl = tower.levels[item.id] || 0;
                return { ...item, cost: Math.floor(item.baseCost * Math.pow(1.3, lvl)) };
            });
            renderShop();
        }

        function renderShop() {
            const container = document.getElementById('shop-container'); container.innerHTML = '';
            currentShop.forEach((item, idx) => {
                const lvl = tower.levels[item.id] || 0;
                const btn = document.createElement('button');
                btn.className = "shop-btn glass-panel p-2 rounded-xl flex flex-col items-center pointer-events-auto text-white";
                btn.disabled = cash < item.cost;
                btn.onclick = () => {
                    if(cash >= item.cost) {
                        cash -= item.cost; tower.levels[item.id] = lvl + 1;
                        if(item.id === 'w_atk') tower.damage += 10;
                        if(item.id === 'p_hp') { tower.maxHp += 75; tower.hp += 75; }
                        if(item.id === 'p_spd') tower.atkSpeed += 0.15;
                        updateUI(); renderShop();
                    }
                };
                btn.innerHTML = `<span class="text-xl">${item.icon}</span><span class="text-[10px] font-bold">${item.name}</span><span class="text-xs text-yellow-400">$${item.cost}</span><span class="text-[8px] text-blue-400">Lv.${lvl}</span>`;
                container.appendChild(btn);
            });
        }

        function updateUI() {
            document.getElementById('current-wave').innerText = wave;
            document.getElementById('run-cash').innerText = "$ " + Math.floor(cash);
            document.getElementById('permanent-coins').innerText = totalCoins;
        }

        function spawnEnemy() {
            const ang = Math.random()*Math.PI*2, d = Math.max(canvas.width, canvas.height)*0.6;
            enemies.push({ x: tower.x+Math.cos(ang)*d, y: tower.y+Math.sin(ang)*d, hp: 10*wave, maxHp: 10*wave, spd: 50+wave, sz: 10, c: '#f87171' });
        }

        function gameLoop(time) {
            if(!isPlaying || isPaused) return;
            const dt = (time - lastTime) / 1000 * gameSpeed; lastTime = time;
            ctx.fillStyle = '#020617'; ctx.fillRect(0,0,canvas.width,canvas.height);

            // Spawning
            spawnCooldown -= dt; if(spawnCooldown <= 0) { spawnEnemy(); spawnCooldown = 1.5; }

            // Enemies
            enemies.forEach((e, i) => {
                const ang = Math.atan2(tower.y-e.y, tower.x-e.x);
                e.x += Math.cos(ang)*e.spd*dt; e.y += Math.sin(ang)*e.spd*dt;
                ctx.fillStyle = e.c; ctx.beginPath(); ctx.arc(e.x, e.y, e.sz, 0, Math.PI*2); ctx.fill();
                if(Math.sqrt((tower.x-e.x)**2 + (tower.y-e.y)**2) < 30) { tower.hp -= 10; enemies.splice(i, 1); if(tower.hp <= 0) endGame(); }
            });

            // Tower
            ctx.fillStyle = '#3b82f6'; ctx.fillRect(tower.x-15, tower.y-15, 30, 30);
            ctx.fillStyle = '#10b981'; ctx.fillRect(tower.x-45, tower.y+25, 90*(tower.hp/tower.maxHp), 8);
            
            updateUI(); requestAnimationFrame(gameLoop);
        }

        function updateWorkshopUI() {
            const list = document.getElementById('workshop-list'); list.innerHTML = '';
            document.getElementById('permanent-coins').innerText = totalCoins;
            Object.keys(workshop).forEach(k => {
                const i = workshop[k];
                list.innerHTML += `<div class="flex justify-between items-center bg-slate-800/40 p-2 rounded-xl border border-white/5 text-white">
                <div><p class="text-xs font-bold text-white">${i.name}</p><p class="text-[10px] text-slate-400">Lv: ${i.lvl}</p></div>
                <button onclick="buyWorkshop('${k}')" ${totalCoins<i.cost?'disabled':''} class="bg-yellow-600 px-3 py-1 rounded text-white text-[10px]">Buy (${i.cost})</button></div>`;
            });
        }
        function buyWorkshop(k) { if(totalCoins >= workshop[k].cost) { totalCoins -= workshop[k].cost; workshop[k].lvl++; workshop[k].cost = Math.floor(workshop[k].cost*1.5); localStorage.setItem('itd_coins', totalCoins); localStorage.setItem('itd_workshop', JSON.stringify(workshop)); updateWorkshopUI(); } }
        function backToMenu() { document.getElementById('game-over').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); isPlaying = false; updateWorkshopUI(); }
        function endGame() { isPlaying = false; totalCoins += wave*5; localStorage.setItem('itd_coins', totalCoins); document.getElementById('final-wave').innerText = wave; document.getElementById('earned-coins').innerText = `+${wave*5}`; document.getElementById('game-ui').classList.add('hidden'); document.getElementById('game-over').classList.remove('hidden'); }
        function togglePause() { isPaused = !isPaused; document.getElementById('pause-btn').innerText = isPaused ? '▶ RESUME' : '⏸ PAUSE'; }
        function setSpeed(s) { gameSpeed = s; document.querySelectorAll('[id^="spd-"]').forEach(b => b.classList.remove('speed-btn-active')); document.getElementById('spd-'+s).classList.add('speed-btn-active'); }
        function toggleInventory() { document.getElementById('inventory-modal').classList.toggle('hidden'); }
        updateWorkshopUI();
    </script>
</body>
</html>
