<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Tower Defense - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; margin: 0; user-select: none; }
        canvas { display: block; touch-action: none; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .shop-btn { transition: all 0.2s ease; position: relative; }
        .shop-btn:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        .shop-btn:active:not(:disabled) { transform: scale(0.95); }
        .speed-btn-active { background-color: #3b82f6 !important; color: white !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        
        .tooltip {
            visibility: hidden; position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%);
            width: 180px; background-color: rgba(15, 23, 42, 0.98); color: #fff; text-align: center;
            padding: 10px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100; font-size: 11px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .shop-btn:hover .tooltip { visibility: visible; opacity: 1; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .inventory-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <div id="main-menu" class="absolute inset-0 z-50 flex flex-col items-center justify-center p-4 bg-slate-950/90 text-white">
        <h1 class="text-6xl font-extrabold mb-8 italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 drop-shadow-2xl">IDLE TOWER</h1>
        <div class="glass-panel p-6 rounded-3xl w-full max-w-md shadow-2xl border-t border-white/10">
            <div class="flex justify-between items-center mb-6">
                <span class="text-xl font-bold">เหรียญถาวร: <span id="permanent-coins" class="text-yellow-400">0</span></span>
            </div>
            <h2 class="text-lg mb-4 font-semibold border-b border-slate-700 pb-2 flex items-center">
                <span class="mr-2">🛠️</span> Workshop (อัปเกรดถาวร)
            </h2>
            <div id="workshop-list" class="space-y-3 overflow-y-auto max-h-[40vh] pr-2"></div>
            <button onclick="startGame()" class="w-full mt-8 bg-blue-600 hover:bg-blue-500 font-bold py-4 rounded-2xl text-xl shadow-lg transition-all active:scale-95 border-b-4 border-blue-800">เข้าสู่สนามรบ</button>
        </div>
    </div>

    <div id="game-ui" class="hidden absolute inset-0 pointer-events-none p-4 flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="flex flex-col gap-2">
                <div class="glass-panel p-2 px-4 rounded-2xl pointer-events-auto border-l-4 border-blue-500">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Wave</p>
                    <p id="current-wave" class="text-2xl font-black text-white">1</p>
                </div>
                <div class="flex gap-1 pointer-events-auto flex-wrap max-w-[220px]">
                    <button onclick="setSpeed(1)" id="spd-1" class="speed-btn-active bg-slate-800 px-2 py-1 rounded text-[10px] font-bold">x1</button>
                    <button onclick="setSpeed(2)" id="spd-2" class="bg-slate-800 px-2 py-1 rounded text-[10px] font-bold">x2</button>
                    <button onclick="setSpeed(4)" id="spd-4" class="bg-slate-800 px-2 py-1 rounded text-[10px] font-bold">x4</button>
                    <button onclick="setSpeed(8)" id="spd-8" class="bg-slate-800 px-2 py-1 rounded text-[10px] font-bold">x8</button>
                    <button onclick="togglePause()" id="pause-btn" class="bg-red-900/60 px-2 py-1 rounded text-[10px] font-bold text-white">⏸ PAUSE</button>
                </div>
            </div>
            
            <div class="flex flex-col gap-2 items-end">
                <div class="glass-panel p-2 px-4 rounded-2xl pointer-events-auto min-w-[120px] border-r-4 border-cyan-400 text-right">
                    <p class="text-[10px] text-cyan-400 font-bold uppercase">CASH</p>
                    <p id="run-cash" class="text-xl font-bold text-white">$ 0</p>
                </div>
                <button onclick="toggleInventory()" class="glass-panel p-2 px-3 rounded-xl bg-slate-800/60 pointer-events-auto border border-white/10 hover:bg-slate-700 transition">
                    <span class="text-xs text-white font-semibold">📦 ดู Build</span>
                </button>
            </div>
        </div>

        <div id="inventory-modal" class="hidden absolute top-32 right-4 w-64 glass-panel p-4 rounded-2xl border-r-4 border-blue-500 pointer-events-auto z-50 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-bold text-blue-400 uppercase tracking-widest">Equipped Items</span>
                <button onclick="toggleInventory()" class="text-slate-500">✕</button>
            </div>
            <div class="space-y-4 max-h-[50vh] overflow-y-auto">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Weapons (<span id="wpn-count">0</span>/6)</p>
                    <div id="wpn-list" class="space-y-1"></div>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Passives (<span id="pas-count">0</span>/6)</p>
                    <div id="pas-list" class="space-y-1"></div>
                </div>
            </div>
        </div>

        <div id="game-msg" class="text-center text-4xl font-black text-white opacity-0 transition-all scale-150 pointer-events-none drop-shadow-lg">WAVE START!</div>

        <div class="w-full pointer-events-auto">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] font-bold text-blue-400 uppercase bg-slate-900/80 px-2 py-0.5 rounded-t-md border-t border-x border-white/10 italic text-white">Slot Based Shop</span>
                <button onclick="manualRefresh()" id="refresh-btn" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1 rounded-lg text-[10px] font-bold transition active:scale-90 text-white">รีเฟรช ($<span id="refresh-cost">10</span>)</button>
            </div>
            <div id="shop-container" class="glass-panel p-2 rounded-xl grid grid-cols-3 md:grid-cols-6 gap-2 border-t-2 border-blue-500/50 shadow-xl"></div>
        </div>
    </div>

    <div id="game-over" class="hidden absolute inset-0 z-[60] flex items-center justify-center p-4 bg-black/90 text-center text-white">
        <div class="glass-panel p-8 rounded-3xl w-full max-w-sm border-t-4 border-red-500">
            <h2 class="text-4xl font-black text-red-500 mb-4 italic">GAME OVER</h2>
            <p class="text-slate-300 mb-6">คุณต้านทานได้ถึง Wave: <span id="final-wave" class="text-white font-bold">1</span></p>
            <div class="bg-slate-900/50 p-4 rounded-2xl mb-8">
                <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Coins Earned</p>
                <p id="earned-coins" class="text-3xl font-black text-yellow-400">+0</p>
            </div>
            <button onclick="backToMenu()" class="w-full bg-white text-slate-950 font-black py-3 rounded-xl hover:bg-slate-200 transition-all active:scale-95">กลับเมนูหลัก</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- DATA & CONFIG ---
        let isPlaying = false, isPaused = false, gameSpeed = 1, wave = 1, cash = 0, totalCoins = parseInt(localStorage.getItem('itd_coins')) || 0;
        let lastTime = performance.now(), nextWaveTimer = 0, messageTimer = 0, manualRefreshCount = 0;
        let enemies = [], projectiles = [], particles = [], lightningEffects = [], waveQueue = [], isWaveActive = false;

        const workshop = JSON.parse(localStorage.getItem('itd_workshop')) || {
            damage: { name: "Base ATK", lvl: 1, cost: 10, inc: 2.5 },
            health: { name: "Max HP", lvl: 1, cost: 10, inc: 40 },
            cashBonus: { name: "Cash+", lvl: 0, cost: 50, inc: 10 }
        };

        let tower = { x: 0, y: 0, size: 25, hp: 100, maxHp: 100, regen: 0, damage: 10, range: 240, atkSpeed: 1.0, atkTimer: 0, multishot: 1, shieldHp: 0, shieldMaxHp: 0, shieldAura: 0, weaponSlots: [], passiveSlots: [], levels: {}, critChance: 0, bounceChance: 0, cashMult: 1, coinMult: 1 };

        const weaponPool = [
            { id: 'wpn_atk', name: 'Base ATK', icon: '⚔️', type: 'weapon', desc: 'ดาเมจพื้นฐาน +10', baseCost: 15 },
            { id: 'wpn_ice', name: 'Frost Bolt', icon: '❄️', type: 'weapon', desc: 'แช่แข็งมอนสเตอร์เดินช้าลง 50%', baseCost: 150 },
            { id: 'wpn_wind', name: 'Hurricane', icon: '🍃', type: 'weapon', desc: 'โอกาสผลักศัตรูกระเด็นกลับ', baseCost: 180 },
            { id: 'wpn_earth', name: 'Earthquake', icon: '⛰️', type: 'weapon', desc: 'โอกาสทำให้ศัตรูติด Stun 1.2 วินาที', baseCost: 200 },
            { id: 'wpn_water', name: 'Tidal Wave', icon: '💧', type: 'weapon', desc: 'ดาเมจกระจายแบบ Splash รอบเป้าหมาย', baseCost: 160 },
            { id: 'wpn_dark', name: 'Abyss', icon: '🔮', type: 'weapon', desc: 'กัดกร่อนเลือดต่อเนื่อง (DoT)', baseCost: 250 },
            { id: 'wpn_nature', name: 'Root Bind', icon: '🌿', type: 'weapon', desc: 'โอกาสตรึงศัตรูอยู่กับที่', baseCost: 220 },
            { id: 'wpn_light', name: 'Chain Light', icon: '⚡', type: 'weapon', desc: 'สายฟ้าชิ่งโดนเป้าหมายใกล้เคียง', baseCost: 300 },
            { id: 'wpn_fire', name: 'Meteor', icon: '🔥', type: 'weapon', desc: 'ระเบิดทำดาเมจวงกว้างเมื่อปะทะ', baseCost: 350 },
            { id: 'wpn_laser', name: 'Plasma Ray', icon: '🔦', type: 'weapon', desc: 'ยิงลำแสงแรงสูงเจาะเป้าหมายเดียว', baseCost: 400 }
        ];

        const passivePool = [
            { id: 'pas_spd', name: 'ATK Speed', icon: '🏃', type: 'passive', desc: 'เพิ่มความเร็วโจมตี +15%', baseCost: 20 },
            { id: 'pas_hp', name: 'Max HP', icon: '❤️', type: 'passive', desc: 'เพิ่มเลือดสูงสุดป้อม +75', baseCost: 20 },
            { id: 'pas_reg', name: 'HP Regen', icon: '🧪', type: 'passive', desc: 'ฟื้นฟูเลือด +1.5/วินาที', baseCost: 40 },
            { id: 'pas_crit', name: 'Crit Rate', icon: '💥', type: 'passive', desc: 'โอกาสทำดาเมจ x2.5 เพิ่ม +8%', baseCost: 100 },
            { id: 'pas_bou', name: 'Bounce', icon: '➰', type: 'passive', desc: 'กระสุนมีโอกาสเด้งหาศัตรูตัวอื่น', baseCost: 250 },
            { id: 'pas_shi', name: 'Energy Shield', icon: '🛡️', type: 'passive', desc: 'สร้างโล่ลดความเสียหายและดาเมจออร่า', baseCost: 300 },
            { id: 'pas_cash', name: 'Cash Bonus', icon: '💰', type: 'passive', desc: 'เงิน Cash ที่ได้รับเพิ่มขึ้น 20%', baseCost: 200 },
            { id: 'pas_coin', name: 'Coin Bonus', icon: '🪙', type: 'passive', desc: 'เหรียญถาวรที่ได้รับเพิ่มขึ้น 25%', baseCost: 300 },
            { id: 'pas_rng', name: 'ATK Range', icon: '🎯', type: 'passive', desc: 'ขยายระยะยิงของป้อม +50', baseCost: 150 },
            { id: 'pas_mul', name: 'Multishot', icon: '🏹', type: 'passive', desc: 'เพิ่มจำนวนกระสุนที่ยิงพร้อมกัน +1', baseCost: 500 }
        ];

        // --- CORE FUNCTIONS ---
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; tower.x = canvas.width/2; tower.y = canvas.height/2; }
        window.addEventListener('resize', resize); resize();

        function startGame() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            wave = 1; cash = 150; runCoins = 0; manualRefreshCount = 0;
            enemies = []; projectiles = []; particles = []; waveQueue = []; lightningEffects = [];
            tower.levels = {}; tower.weaponSlots = []; tower.passiveSlots = [];
            tower.damage = 10 + (workshop.damage.lvl-1)*workshop.damage.inc;
            tower.maxHp = 100 + (workshop.health.lvl-1)*workshop.health.inc;
            tower.hp = tower.maxHp; tower.atkSpeed = 1.0; tower.regen = 0; tower.range = 240; tower.multishot = 1;
            tower.shieldHp = 0; tower.shieldMaxHp = 0; tower.shieldAura = 0; tower.critChance = 0; tower.bounceChance = 0;
            tower.cashMult = 1; tower.coinMult = 1;
            isPlaying = true; isPaused = false; generateShop(); updateUI(); requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isPlaying = false;
            let earned = Math.floor(runCoins * tower.coinMult);
            totalCoins += earned;
            document.getElementById('final-wave').innerText = wave;
            document.getElementById('earned-coins').innerText = `+${earned}`;
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('game-over').classList.remove('hidden');
            localStorage.setItem('itd_coins', totalCoins);
        }

        function backToMenu() { document.getElementById('game-over').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); updateWorkshopUI(); }

        // --- SHOP & INVENTORY ---
        function generateShop() {
            const all = [...weaponPool, ...passivePool];
            currentShop = all.sort(() => 0.5 - Math.random()).slice(0, 6).map(item => {
                const lvl = tower.levels[item.id] || 0;
                return { ...item, cost: Math.floor(item.baseCost * Math.pow(1.35, lvl)) };
            });
            renderShop();
        }

        function renderShop() {
            const container = document.getElementById('shop-container'); container.innerHTML = '';
            currentShop.forEach((item, idx) => {
                const isWpn = item.type === 'weapon', lvl = tower.levels[item.id] || 0;
                const slots = isWpn ? tower.weaponSlots : tower.passiveSlots;
                const full = slots.length >= 6 && !slots.includes(item.id);
                const btn = document.createElement('button');
                btn.className = `shop-btn glass-panel p-1.5 rounded-lg flex flex-col items-center border ${isWpn ? 'border-blue-500/30' : 'border-green-500/30'} pointer-events-auto`;
                btn.disabled = cash < item.cost || full;
                btn.onclick = () => {
                    if(cash >= item.cost && !full) {
                        cash -= item.cost; if(!slots.includes(item.id)) slots.push(item.id);
                        tower.levels[item.id] = lvl + 1;
                        // Apply effect
                        if(item.id === 'wpn_atk') tower.damage += 10;
                        if(item.id === 'pas_spd') tower.atkSpeed += 0.15;
                        if(item.id === 'pas_hp') { tower.maxHp += 75; tower.hp += 75; }
                        if(item.id === 'pas_reg') tower.regen += 1.5;
                        if(item.id === 'pas_crit') tower.critChance += 8;
                        if(item.id === 'pas_bou') tower.bounceChance += 15;
                        if(item.id === 'pas_cash') tower.cashMult += 0.2;
                        if(item.id === 'pas_coin') tower.coinMult += 0.25;
                        if(item.id === 'pas_rng') tower.range += 50;
                        if(item.id === 'pas_mul') tower.multishot += 1;
                        if(item.id === 'pas_shi') { tower.shieldMaxHp += 100; tower.shieldHp = tower.shieldMaxHp; tower.shieldAura += 8; }
                        currentShop.splice(idx, 1); if(currentShop.length === 0) generateShop();
                        renderShop(); updateUI();
                    }
                };
                btn.innerHTML = `
                    <div class="absolute top-0 right-0 bg-blue-600/60 text-[7px] px-1 rounded-bl-md font-bold">Lv.${lvl}</div>
                    <span class="text-lg mb-0.5">${item.icon}</span>
                    <span class="text-[9px] text-white font-bold truncate w-full uppercase">${item.name}</span>
                    <span class="text-xs text-yellow-400 font-bold">$${item.cost}</span>
                    <div class="tooltip"><p class="font-bold text-blue-300 mb-1 uppercase">${item.name}</p><p class="mb-1">${item.desc}</p>${full ? '<p class="text-red-400 mt-1 font-bold">ช่องเต็ม!</p>' : ''}</div>
                `;
                container.appendChild(btn);
            });
        }

        function toggleInventory() {
            const modal = document.getElementById('inventory-modal');
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) {
                const wList = document.getElementById('wpn-list'), pList = document.getElementById('pas-list');
                wList.innerHTML = ''; pList.innerHTML = '';
                document.getElementById('wpn-count').innerText = tower.weaponSlots.length;
                document.getElementById('pas-count').innerText = tower.passiveSlots.length;
                tower.weaponSlots.forEach(id => {
                    const item = weaponPool.find(x => x.id === id);
                    wList.innerHTML += `<div class="inventory-item flex justify-between p-2 rounded-lg text-[10px]"><span>${item.icon} ${item.name}</span><span class="text-blue-400 font-bold">Lv.${tower.levels[id]}</span></div>`;
                });
                tower.passiveSlots.forEach(id => {
                    const item = passivePool.find(x => x.id === id);
                    pList.innerHTML += `<div class="inventory-item flex justify-between p-2 rounded-lg text-[10px]"><span>${item.icon} ${item.name}</span><span class="text-green-400 font-bold">Lv.${tower.levels[id]}</span></div>`;
                });
            }
        }

        // --- WAVE LOGIC ---
        function prepareWave(w) {
            waveQueue = []; const isBoss = w % 10 === 0;
            if (isBoss) { waveQueue.push({ type: 'boss', mult: 1+(w*0.15), interval: 1 }); }
            else {
                const pts = 15 + (w*8); let cur = 0;
                const swarm = w % 4 === 0, armored = w % 5 === 0;
                while (cur < pts) {
                    const r = Math.random();
                    if (r < 0.4) { waveQueue.push({ type: 'normal', mult: 1+(w*0.1), interval: 0.25 }); cur++; }
                    else if (swarm && r < 0.7) { for(let i=0; i<10; i++) waveQueue.push({ type: 'swarm', mult: 1+(w*0.06), interval: 0.08 }); cur += 2; }
                    else if (armored && r < 0.9) { waveQueue.push({ type: 'armored', mult: 1+(w*0.12), interval: 0.6 }); cur += 3; }
                    else { waveQueue.push({ type: 'normal', mult: 1+(w*0.1), interval: 0.3 }); cur++; }
                }
            }
        }

        function spawnEnemy(t, m) {
            const ang = Math.random()*Math.PI*2, d = Math.max(canvas.width, canvas.height)*0.6;
            let e = { x: tower.x+Math.cos(ang)*d, y: tower.y+Math.sin(ang)*d, type: t, slow: 0, stun: 0, dot: 0, root: 0 };
            let balance = wave < 5 ? 0.65 : 1;
            if(t==='normal'){ e.hp=10*m*balance; e.spd=50+wave; e.dmg=4+wave*0.2; e.sz=10; e.c='#f87171'; e.cr=4; }
            if(t==='swarm'){ e.hp=4*m*balance; e.spd=120+wave; e.dmg=2+wave*0.1; e.sz=6; e.c='#fb923c'; e.cr=1; }
            if(t==='armored'){ e.hp=40*m; e.spd=50; e.dmg=9+wave*0.4; e.sz=13; e.c='#475569'; e.cr=8; }
            if(t==='boss'){ e.hp=400*m; e.spd=30; e.dmg=50+wave*2; e.sz=40; e.c='#7e22ce'; e.cr=200; e.cor=30; }
            e.maxHp = e.hp; enemies.push(e);
        }

        // --- UPDATE & RENDER ---
        function update(dt) {
            if(!isPlaying || isPaused) return;
            const adt = Math.min(dt, 0.1) * gameSpeed;

            if(tower.hp < tower.maxHp) tower.hp = Math.min(tower.maxHp, tower.hp + tower.regen*adt);
            if(tower.shieldHp < tower.shieldMaxHp) tower.shieldHp = Math.min(tower.shieldMaxHp, tower.shieldHp + 3*adt);
            if(tower.shieldHp > 0) { enemies.forEach(e => { if(dist(tower.x, tower.y, e.x, e.y) < 80) e.hp -= (tower.shieldAura + tower.damage*0.1)*adt; }); }

            if(!isWaveActive && enemies.length === 0 && nextWaveTimer <= 0) { nextWaveTimer = 2.0; messageTimer = 1.5; document.getElementById('game-msg').style.opacity = 1; }
            if(nextWaveTimer > 0) { nextWaveTimer -= adt; if(nextWaveTimer <= 0) { prepareWave(wave); isWaveActive = true; document.getElementById('game-msg').style.opacity = 0; } }
            if(isWaveActive) {
                spawnCooldown -= adt; if(spawnCooldown <= 0 && waveQueue.length > 0) { const n = waveQueue.shift(); spawnEnemy(n.type, n.mult); spawnCooldown = n.interval; }
                if(waveQueue.length === 0 && enemies.length === 0) { isWaveActive = false; cash += (25 + workshop.cashBonus.lvl*10)*tower.cashMult; wave++; generateShop(); manualRefreshCount = 0; }
            }

            tower.atkTimer += adt;
            if(tower.atkTimer >= 1/tower.atkSpeed) {
                const tar = enemies.filter(e => dist(tower.x, tower.y, e.x, e.y) <= tower.range).sort((a,b) => dist(tower.x, tower.y, a.x, a.y) - dist(tower.x, tower.y, b.x, b.y));
                if(tar.length > 0) {
                    for(let i=0; i<Math.min(tower.multishot, tar.length); i++) {
                        const isCrit = Math.random() < tower.critChance/100;
                        const wps = tower.weaponSlots.filter(id => id !== 'wpn_atk');
                        const el = wps.length > 0 ? wps[Math.floor(Math.random()*wps.length)] : null;
                        const colors = { wpn_ice: '#06b6d4', wpn_wind: '#4ade80', wpn_earth: '#a16207', wpn_water: '#3b82f6', wpn_dark: '#a855f7', wpn_nature: '#84cc16', wpn_light: '#eab308', wpn_fire: '#f97316', wpn_laser: '#ef4444' };
                        projectiles.push({ x: tower.x, y: tower.y, ang: Math.atan2(tar[i].y-tower.y, tar[i].x-tower.x), spd: el === 'wpn_laser' ? 1000 : 500, dmg: tower.damage*(isCrit?2.5:1), isCrit, el, c: el?colors[el]:'#60a5fa' });
                    }
                    tower.atkTimer = 0;
                }
            }

            projectiles.forEach((p, i) => {
                p.x += Math.cos(p.ang)*p.spd*adt; p.y += Math.sin(p.ang)*p.spd*adt;
                enemies.forEach(e => {
                    if(dist(p.x, p.y, e.x, e.y) < e.sz+5) {
                        e.hp -= p.dmg; p.del = true;
                        if(p.el === 'wpn_ice') e.slow = 2.5;
                        if(p.el === 'wpn_earth' && Math.random() < 0.25) e.stun = 1.2;
                        if(p.el === 'wpn_light') triggerLightning(e, 3);
                        if(tower.bounceChance > 0 && Math.random() < tower.bounceChance/100 && !p.bou) {
                            const next = enemies.find(en => en !== e && dist(e.x, e.y, en.x, en.y) < 150);
                            if(next) { p.del = false; p.bou = true; p.ang = Math.atan2(next.y-p.y, next.x-p.x); }
                        }
                    }
                });
                if(dist(tower.x, tower.y, p.x, p.y) > tower.range+50 || p.del) projectiles.splice(i, 1);
            });

            enemies.forEach((e, i) => {
                let curSpd = e.spd;
                if(e.slow > 0) { e.slow -= adt; curSpd *= 0.5; }
                if(e.stun > 0) { e.stun -= adt; curSpd = 0; }
                const ang = Math.atan2(tower.y-e.y, tower.x-e.x);
                e.x += Math.cos(ang)*curSpd*adt; e.y += Math.sin(ang)*curSpd*adt;
                if(dist(e.x, e.y, tower.x, tower.y) < tower.size+5) {
                    let d = e.dmg; if(tower.shieldHp > 0) { const a = Math.min(tower.shieldHp, d); tower.shieldHp -= a; d -= a; }
                    tower.hp -= d; if(tower.hp <= 0) endGame(); enemies.splice(i, 1);
                }
                if(e.hp <= 0) { cash += e.cr*tower.cashMult; runCoins += e.cor || 1; enemies.splice(i, 1); }
            });

            for(let i=lightningEffects.length-1; i>=0; i--) { lightningEffects[i].l -= adt; if(lightningEffects[i].l <= 0) lightningEffects.splice(i, 1); }
        }

        function draw() {
            ctx.fillStyle = '#020617'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
            for(let x=0;x<canvas.width;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
            for(let y=0;y<canvas.height;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}

            if(tower.shieldHp > 0) { ctx.beginPath(); ctx.arc(tower.x, tower.y, 45, 0, Math.PI*2); ctx.strokeStyle = `rgba(59, 130, 246, 0.4)`; ctx.lineWidth = 4; ctx.stroke(); }
            enemies.forEach(e => { ctx.fillStyle = e.c; ctx.beginPath(); ctx.arc(e.x, e.y, e.sz, 0, Math.PI*2); ctx.fill(); });
            projectiles.forEach(p => { ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); });
            
            lightningEffects.forEach(le => {
                ctx.strokeStyle = `rgba(234, 179, 8, ${le.l})`; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(le.x1, le.y1);
                ctx.lineTo((le.x1+le.x2)/2 + (Math.random()-0.5)*30, (le.y1+le.y2)/2 + (Math.random()-0.5)*30); ctx.lineTo(le.x2, le.y2); ctx.stroke();
            });

            ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.roundRect(tower.x-12.5, tower.y-12.5, 25, 25, 6); ctx.fill();
            const hpW = 90; ctx.fillStyle = '#1e293b'; ctx.fillRect(tower.x-hpW/2, tower.y+25, hpW, 8);
            ctx.fillStyle = '#10b981'; ctx.fillRect(tower.x-hpW/2, tower.y+25, hpW*(tower.hp/tower.maxHp), 8);
        }

        function triggerLightning(s, j) {
            let cur = s; let hit = new Set([s]);
            for(let i=0; i<j; i++) {
                const next = enemies.find(e => !hit.has(e) && dist(cur.x, cur.y, e.x, e.y) < 130);
                if(!next) break;
                lightningEffects.push({ x1: cur.x, y1: cur.y, x2: next.x, y2: next.y, l: 1.0 });
                next.hp -= tower.damage*0.6; hit.add(next); cur = next;
            }
        }

        function setSpeed(s) { gameSpeed = s; document.querySelectorAll('[id^="spd-"]').forEach(b => b.classList.remove('speed-btn-active')); document.getElementById('spd-'+s).classList.add('speed-btn-active'); }
        function togglePause() { isPaused = !isPaused; document.getElementById('pause-btn').innerText = isPaused ? '▶ RESUME' : '⏸ PAUSE'; }
        function dist(x1,y1,x2,y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }
        function manualRefresh() { let cost = 10 + wave*2; if(cash >= cost) { cash -= cost; generateShop(); updateUI(); } }

        function updateWorkshopUI() {
            const list = document.getElementById('workshop-list'); list.innerHTML = '';
            document.getElementById('permanent-coins').innerText = totalCoins;
            Object.keys(workshop).forEach(k => {
                const i = workshop[k]; const d = document.createElement('div');
                d.className = 'flex justify-between items-center bg-slate-800/40 p-2.5 rounded-xl border border-white/5';
                d.innerHTML = `<div><p class="text-xs font-medium text-white">${i.name}</p><p class="text-[10px] text-slate-400">Lv: ${i.lvl}</p></div>
                    <button onclick="upgradeWorkshop('${k}')" ${totalCoins<i.cost?'disabled':''} class="bg-yellow-600 px-3 py-1.5 rounded-lg text-[10px] font-bold text-white shadow-md">Buy (${i.cost})</button>`;
                list.appendChild(d);
            });
        }

        function upgradeWorkshop(k) {
            if(totalCoins >= workshop[k].cost) {
                totalCoins -= workshop[k].cost; workshop[k].lvl++; workshop[k].cost = Math.floor(workshop[k].cost*1.6);
                localStorage.setItem('itd_coins', totalCoins); localStorage.setItem('itd_workshop', JSON.stringify(workshop));
                updateWorkshopUI();
            }
        }

        function gameLoop(time) { if(isPlaying) { update((time - lastTime)/1000); draw(); lastTime = time; requestAnimationFrame(gameLoop); } }
        updateWorkshopUI();
    </script>
</body>
</html>
